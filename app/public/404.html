<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page not found | InkedUp</title>
  <meta name="robots" content="noindex" />
  <style>
    :root {
      --warm-ivory: #F9F7F2;
      --midnight-navy: #0B1F3F;
      --champagne-gold: #C9A962;
      --slate-gray: #5A6573;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--warm-ivory);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: var(--midnight-navy);
      padding: 1rem;
    }

    .container {
      text-align: center;
      max-width: 28rem;
    }

    .code {
      font-size: clamp(5rem, 15vw, 8.75rem);
      font-weight: 500;
      color: rgba(201, 169, 98, 0.4);
      line-height: 1;
    }

    h1 {
      font-size: clamp(1.75rem, 4vw, 2.5rem);
      font-weight: 500;
      margin: 0.5rem 0 0;
    }

    p {
      font-size: 0.9375rem;
      color: var(--slate-gray);
      margin: 0.75rem 0 0;
      line-height: 1.6;
    }

    a {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      margin-top: 2rem;
      padding: 0.875rem 2rem;
      border-radius: 9999px;
      background: linear-gradient(135deg, #D4AF37 0%, #C9A962 100%);
      color: var(--midnight-navy);
      text-decoration: none;
      font-size: 0.875rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      transition: box-shadow 0.2s ease;
    }

    a:hover {
      box-shadow: 0 4px 20px rgba(201, 169, 98, 0.35);
    }
  </style>
</head>
<body>
  <main class="container">
    <div class="code">404</div>
    <h1>Page not found</h1>
    <p>The page you're looking for doesn't exist or has moved.</p>
    <a href="/">Back to Home</a>
  </main>
</body>
</html>
